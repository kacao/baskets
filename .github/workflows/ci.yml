# Follow-up (deferred): integration + e2e jobs are not wired up here. They need
# a live seeded SQLite app on http://localhost:5173 (DB_DIALECT=sqlite,
# DATABASE_URL=./data/ci.db, `npm run db:push` + `npm run db:seed` with
# SEED_ADMIN_PASSWORD from a repo secret, then `npm run dev` in the background,
# wait for :5173, then `RUN_INTEGRATION=1 npm run test:integration`). This
# depends on plans/001 (RUN_INTEGRATION gating, already landed) but the job
# shape (server boot + readiness wait) wasn't verified locally, so it's left
# for a follow-up change. e2e (Playwright) similarly needs a live server and
# is out of scope here.
#
# Server-free suites ARE wired below: `npm test` (unit + `*.svelte.test.ts`
# component tests) and `npm run test:server` (isolated per-run SQLite DB — its
# globalSetup drives `drizzle-kit push` against a throwaway ./data/test-server.db,
# no live server needed), plus lint + format:check.
name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
jobs:
  check-and-test:
    name: check + lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build icon sprite
        run: npm run icons:build
      - name: Type + Svelte check
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit + component tests
        run: npm test
      - name: Server characterization tests (isolated DB)
        run: npm run test:server
